<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="/web/favicon.ico">
  <link rel="apple-touch-icon" href="/web/apple-touch-icon.png">
  <link rel="manifest" href="/web/manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <title data-i18n="urlDist.title">URL 分发 - Claude Code & Codex Proxy</title>
  <link rel="stylesheet" href="/web/assets/css/styles.css?v=__VERSION__">
  <script defer src="/web/assets/locales/zh-CN.js?v=__VERSION__"></script>
  <script defer src="/web/assets/locales/en.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/i18n.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/template-engine.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/ui.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/url-distribution.js?v=__VERSION__"></script>
  <style>
    .urldist-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 8px 12px;
    }
    .urldist-toolbar .urldist-updated {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-secondary, #6b7280);
    }
    .urldist-toolbar .urldist-autorefresh {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
    }
    .urldist-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      padding: 12px;
    }
    .urldist-summary-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .urldist-summary-card .label {
      font-size: 12px;
      color: var(--text-secondary, #6b7280);
      margin-bottom: 4px;
    }
    .urldist-summary-card .value {
      font-size: 22px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .urldist-summary-card.is-warn .value { color: #f59e0b; }
    .urldist-summary-card.is-bad .value { color: #ef4444; }
    .urldist-summary-card.is-good .value { color: #22c55e; }

    .urldist-section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 12px 4px 12px;
      flex-wrap: wrap;
    }
    .urldist-section-header .section-title {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    .urldist-section-desc {
      font-size: 12px;
      color: var(--text-secondary, #6b7280);
    }

    .urldist-empty {
      text-align: center;
      color: var(--text-secondary, #6b7280);
      padding: 32px;
      font-size: 13px;
    }

    /* URL 表格里的柱状条：用 CSS 伪元素 + width % 表达分发占比 */
    .urldist-bar-cell {
      position: relative;
      min-width: 220px;
    }
    .urldist-bar {
      position: relative;
      height: 22px;
      background: rgba(148, 163, 184, 0.12);
      border-radius: 4px;
      overflow: hidden;
    }
    .urldist-bar-fill {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      background: linear-gradient(90deg, #3b82f6 0%, #6366f1 100%);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .urldist-bar-fill.is-hot {
      background: linear-gradient(90deg, #f59e0b 0%, #ef4444 100%);
    }
    .urldist-bar-fill.is-cold {
      background: linear-gradient(90deg, #94a3b8 0%, #64748b 100%);
    }
    .urldist-bar-label {
      position: absolute;
      top: 0;
      left: 8px;
      right: 8px;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      color: #f8fafc;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }

    .urldist-cell-mono {
      font-family: var(--font-mono, monospace);
      font-size: 12px;
      word-break: break-all;
    }
    .urldist-cell-num {
      font-variant-numeric: tabular-nums;
      font-family: var(--font-mono, monospace);
      font-size: 12px;
      text-align: right;
      white-space: nowrap;
    }
    .urldist-status {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
    }
    .urldist-status.is-active { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .urldist-status.is-idle { background: rgba(148, 163, 184, 0.2); color: #94a3b8; }
    .urldist-status.is-cooled { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .urldist-status.is-slow { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
  </style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div class="content-area">
        <section class="glass-card mb-4">
          <div class="urldist-toolbar">
            <button id="urldist-refresh-btn" class="btn btn-secondary" data-i18n="urlDist.refresh">刷新</button>
            <label class="urldist-autorefresh">
              <input type="checkbox" id="urldist-autorefresh" />
              <span data-i18n="urlDist.autoRefresh">自动刷新（5秒）</span>
            </label>
            <span class="urldist-updated" id="urldist-updated"></span>
          </div>
        </section>

        <section class="glass-card mb-4">
          <div class="urldist-section-header">
            <h2 class="section-title" data-i18n="urlDist.summaryTitle">总览</h2>
            <span class="urldist-section-desc" data-i18n="urlDist.summaryDesc">活跃 URL = 最近 5 分钟内被分发到过的</span>
          </div>
          <div class="urldist-summary" id="urldist-summary">
            <div class="urldist-summary-card">
              <div class="label" data-i18n="urlDist.totalSelections">总分发次数</div>
              <div class="value" id="summary-total-selections">-</div>
            </div>
            <div class="urldist-summary-card">
              <div class="label" data-i18n="urlDist.totalURLs">URL 总数</div>
              <div class="value" id="summary-total-urls">-</div>
            </div>
            <div class="urldist-summary-card is-good">
              <div class="label" data-i18n="urlDist.activeURLs">活跃 URL</div>
              <div class="value" id="summary-active-urls">-</div>
            </div>
            <div class="urldist-summary-card is-warn">
              <div class="label" data-i18n="urlDist.idleURLs">闲置 URL</div>
              <div class="value" id="summary-idle-urls">-</div>
            </div>
          </div>
        </section>

        <section class="glass-card mb-6">
          <div class="urldist-section-header">
            <h2 class="section-title" data-i18n="urlDist.tableTitle">URL 分发明细</h2>
            <span class="urldist-section-desc" data-i18n="urlDist.tableDesc">按分发次数倒序，柱状图直观展示扎堆程度</span>
          </div>
          <div class="table-container">
            <table class="modern-table">
              <thead>
                <tr>
                  <th data-i18n="urlDist.colChannel">渠道</th>
                  <th data-i18n="urlDist.colURL">URL</th>
                  <th data-i18n="urlDist.colSelections">分发次数</th>
                  <th data-i18n="urlDist.colSuccessRate">成功率</th>
                  <th data-i18n="urlDist.colEWMA">EWMA 延迟</th>
                  <th data-i18n="urlDist.colWeight">轮询权重</th>
                  <th data-i18n="urlDist.colLastUsed">最后使用</th>
                  <th data-i18n="urlDist.colStatus">状态</th>
                </tr>
              </thead>
              <tbody id="urldist-tbody"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
